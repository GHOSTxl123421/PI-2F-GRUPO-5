<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastTrack - Painel da Empresa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fa; }
        
        header {
            background: #1a1a2e;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { color: white; font-size: 1.5rem; font-weight: 800; }
        .logo span { color: #4fc3f7; }
        .header-actions a { color: rgba(255,255,255,0.8); text-decoration: none; margin-left: 20px; }
        .header-actions a:hover { color: white; }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 5%; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-card .number { font-size: 2rem; font-weight: 700; color: #1a1a2e; }
        .stat-card .label { color: #6b7280; font-size: 0.9rem; }
        
        .pedidos-list {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .pedido-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        .pedido-item:last-child { border-bottom: none; }
        
        .status-select {
            padding: 5px 10px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .status-select:focus { outline: none; border-color: #4fc3f7; }
        
        .empty-state { text-align: center; padding: 60px 0; color: #6b7280; }
        .empty-state i { font-size: 4rem; margin-bottom: 20px; display: block; }
        
        .btn-primary {
            background: #4fc3f7;
            color: #1a1a2e;
            border: none;
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary:hover { background: #38bdf8; }
        
        .badge { 
            display: inline-block; 
            padding: 3px 12px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 600;
        }
        .badge-recebido { background: #fef3c7; color: #92400e; }
        .badge-preparando { background: #dbeafe; color: #1e40af; }
        .badge-pronto { background: #d1fae5; color: #065f46; }
        .badge-saiu_entrega { background: #fce4ec; color: #9a3412; }
        .badge-entregue { background: #d1fae5; color: #065f46; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
        }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Fast<span>Track</span></div>
        <div class="header-actions">
            <span style="color:#4fc3f7;">🏢 Empresa</span>
            <a href="#" onclick="abrirModalProduto()" style="color:#4fc3f7;"><i class="fa-solid fa-plus"></i> Produto</a>
            <a href="#" onclick="logout()" style="color:#ef4444;"><i class="fa-solid fa-sign-out-alt"></i></a>
        </div>
    </header>

    <div class="container">
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="number" id="total-pedidos">0</div>
                <div class="label">Total de Pedidos</div>
            </div>
            <div class="stat-card">
                <div class="number" id="pedidos-hoje">0</div>
                <div class="label">Pedidos Hoje</div>
            </div>
            <div class="stat-card">
                <div class="number" id="receita-hoje">R$ 0</div>
                <div class="label">Receita Hoje</div>
            </div>
        </div>

        <div class="pedidos-list">
            <h3 style="margin-bottom:20px;">📋 Pedidos Recebidos</h3>
            <div id="pedidos-container">
                <div class="empty-state"><i class="fa-regular fa-clock"></i>Nenhum pedido recebido ainda</div>
            </div>
        </div>
    </div>

    <!-- Modal para adicionar produto -->
    <div class="modal" id="modal-produto">
        <div class="modal-content">
            <h3>📦 Adicionar Produto</h3>
            <input type="text" id="produto-nome" placeholder="Nome do produto">
            <input type="text" id="produto-desc" placeholder="Descrição">
            <input type="number" id="produto-preco" placeholder="Preço (R$)" step="0.01">
            <input type="number" id="produto-estoque" placeholder="Estoque">
            <div class="modal-actions">
                <button class="btn-primary" onclick="fecharModal()">Cancelar</button>
                <button class="btn-primary" onclick="salvarProduto()">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
        if (!usuario || usuario.tipo !== 'empresa') {
            window.location.href = '/login';
        }

        const token = localStorage.getItem('token');

        // Entrar na sala da empresa
        socket.emit('entrar_sala', `empresa_${usuario.id}`);

        // Ouvir novos pedidos
        socket.on('novo_pedido', (pedido) => {
            console.log('📦 Novo pedido:', pedido);
            carregarPedidos();
        });

        async function carregarPedidos() {
            try {
                const response = await fetch('/api/pedidos/cliente', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                const container = document.getElementById('pedidos-container');
                if (!data.success || data.pedidos.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fa-regular fa-clock"></i>Nenhum pedido recebido ainda</div>`;
                    return;
                }
                
                // Filtrar apenas pedidos da empresa
                const pedidosEmpresa = data.pedidos;
                
                // Atualizar stats
                document.getElementById('total-pedidos').textContent = pedidosEmpresa.length;
                const hoje = new Date().toDateString();
                const pedidosHoje = pedidosEmpresa.filter(p => new Date(p.data_pedido).toDateString() === hoje);
                document.getElementById('pedidos-hoje').textContent = pedidosHoje.length;
                const receita = pedidosHoje.reduce((sum, p) => sum + parseFloat(p.total), 0);
                document.getElementById('receita-hoje').textContent = `R$ ${receita.toFixed(2)}`;
                
                container.innerHTML = pedidosEmpresa.map(p => {
                    const statusClass = `badge-${p.status}`;
                    const statusLabels = {
                        'recebido': '📥 Recebido',
                        'preparando': '👨‍🍳 Preparando',
                        'embalando': '📦 Embalando',
                        'pronto': '✅ Pronto',
                        'saiu_entrega': '🚴 Saiu para entrega',
                        'entregue': '🎉 Entregue'
                    };
                    
                    return `
                        <div class="pedido-item">
                            <div>
                                <div><strong>Pedido #${p.id}</strong> - ${p.codigo_rastreamento}</div>
                                <div style="font-size:0.9rem;color:#6b7280;">Cliente: ${p.cliente_id || 'Cliente'}</div>
                                <div style="font-size:0.9rem;color:#6b7280;">Total: R$ ${parseFloat(p.total).toFixed(2)}</div>
                            </div>
                            <div>
                                <span class="badge ${statusClass}">${statusLabels[p.status] || p.status}</span>
                                <select class="status-select" onchange="atualizarStatus(${p.id}, this.value)">
                                    <option value="recebido" ${p.status === 'recebido' ? 'selected' : ''}>Recebido</option>
                                    <option value="preparando" ${p.status === 'preparando' ? 'selected' : ''}>Preparando</option>
                                    <option value="embalando" ${p.status === 'embalando' ? 'selected' : ''}>Embalando</option>
                                    <option value="pronto" ${p.status === 'pronto' ? 'selected' : ''}>Pronto</option>
                                    <option value="saiu_entrega" ${p.status === 'saiu_entrega' ? 'selected' : ''}>Saiu para entrega</option>
                                    <option value="entregue" ${p.status === 'entregue' ? 'selected' : ''}>Entregue</option>
                                </select>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        async function atualizarStatus(pedidoId, status) {
            try {
                const response = await fetch(`/api/pedidos/${pedidoId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status })
                });
                const data = await response.json();
                if (data.success) {
                    carregarPedidos();
                }
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        function abrirModalProduto() {
            document.getElementById('modal-produto').classList.add('active');
        }

        function fecharModal() {
            document.getElementById('modal-produto').classList.remove('active');
        }

        async function salvarProduto() {
            const nome = document.getElementById('produto-nome').value;
            const descricao = document.getElementById('produto-desc').value;
            const preco = parseFloat(document.getElementById('produto-preco').value);
            const estoque = parseInt(document.getElementById('produto-estoque').value);
            
            if (!nome || !preco) {
                alert('Preencha nome e preço!');
                return;
            }
            
            try {
                const response = await fetch('/api/produtos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        empresa_id: 1, // Por enquanto fixo
                        categoria_id: null,
                        nome,
                        descricao,
                        preco,
                        estoque: estoque || 0
                    })
                });
                const data = await response.json();
                if (data.success) {
                    alert('✅ Produto criado com sucesso!');
                    fecharModal();
                    document.getElementById('produto-nome').value = '';
                    document.getElementById('produto-desc').value = '';
                    document.getElementById('produto-preco').value = '';
                    document.getElementById('produto-estoque').value = '';
                }
            } catch (error) {
                alert('Erro ao criar produto');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('usuario');
            window.location.href = '/login';
        }

        carregarPedidos();
    </script>
</body>
</html>
