<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- ... -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/empresa.css">
</head>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastTrack - Painel da Empresa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fa; }
        
        header {
            background: #1a1a2e;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo { color: white; font-size: 1.5rem; font-weight: 800; }
        .logo span { color: #4fc3f7; }
        .header-actions { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .header-actions a { color: rgba(255,255,255,0.8); text-decoration: none; transition: 0.3s; }
        .header-actions a:hover { color: white; }
        
        .container { max-width: 1400px; margin: 40px auto; padding: 0 5%; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-card .number { font-size: 2rem; font-weight: 700; color: #1a1a2e; }
        .stat-card .label { color: #6b7280; font-size: 0.9rem; }
        
        .actions-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .btn-primary {
            background: #4fc3f7;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover { background: #38bdf8; transform: translateY(-2px); }
        .btn-green { background: #10b981; color: white; }
        .btn-green:hover { background: #059669; }
        .btn-orange { background: #f59e0b; color: white; }
        .btn-orange:hover { background: #d97706; }
        .btn-red { background: #ef4444; color: white; }
        .btn-red:hover { background: #dc2626; }
        
        .pedidos-list, .produtos-list {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .pedido-item, .produto-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #e5e7eb;
            flex-wrap: wrap;
            gap: 10px;
        }
        .pedido-item:last-child, .produto-item:last-child { border-bottom: none; }
        
        .status-select {
            padding: 5px 10px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .status-select:focus { outline: none; border-color: #4fc3f7; }
        
        .badge { 
            display: inline-block; 
            padding: 3px 12px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 600;
        }
        .badge-recebido { background: #fef3c7; color: #92400e; }
        .badge-preparando { background: #dbeafe; color: #1e40af; }
        .badge-pronto { background: #d1fae5; color: #065f46; }
        .badge-saiu_entrega { background: #fce4ec; color: #9a3412; }
        .badge-entregue { background: #d1fae5; color: #065f46; }
        .badge-baixo { background: #fee2e2; color: #991b1b; }
        .badge-normal { background: #d1fae5; color: #065f46; }
        
        .produto-img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            background: #f3f4f6;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 550px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content .form-group { margin-bottom: 15px; }
        .modal-content .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
        }
        .modal-content input:focus, .modal-content textarea:focus, .modal-content select:focus {
            border-color: #4fc3f7;
        }
        .modal-content .preview-img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .empty-state { text-align: center; padding: 60px 0; color: #6b7280; }
        .empty-state i { font-size: 4rem; margin-bottom: 20px; display: block; }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e5e7eb;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            font-weight: 600;
            cursor: pointer;
            color: #6b7280;
            transition: 0.3s;
        }
        .tab-btn.active {
            color: #1a1a2e;
            border-bottom: 3px solid #4fc3f7;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        @media (max-width: 768px) {
            .pedido-item, .produto-item { flex-direction: column; align-items: flex-start; }
            .header-actions { gap: 10px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Fast<span>Track</span></div>
        <div class="header-actions">
            <span style="color:#4fc3f7;">🏢 Empresa</span>
            <a href="#" onclick="abrirModalProduto()"><i class="fa-solid fa-plus"></i> Produto</a>
            <a href="#" onclick="abrirModalEstoque()"><i class="fa-solid fa-boxes-stacked"></i> Repor</a>
            <a href="#" onclick="logout()" style="color:#ef4444;"><i class="fa-solid fa-sign-out-alt"></i></a>
        </div>
    </header>

    <div class="container">
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="number" id="total-pedidos">0</div>
                <div class="label">Total de Pedidos</div>
            </div>
            <div class="stat-card">
                <div class="number" id="pedidos-hoje">0</div>
                <div class="label">Pedidos Hoje</div>
            </div>
            <div class="stat-card">
                <div class="number" id="receita-hoje">R$ 0</div>
                <div class="label">Receita Hoje</div>
            </div>
            <div class="stat-card">
                <div class="number" id="produtos-total">0</div>
                <div class="label">Produtos</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('pedidos')">📋 Pedidos</button>
            <button class="tab-btn" onclick="switchTab('produtos')">📦 Produtos</button>
        </div>

        <!-- TAB PEDIDOS -->
        <div id="tab-pedidos" class="tab-content active">
            <div class="pedidos-list">
                <h3 style="margin-bottom:20px;">📋 Pedidos Recebidos</h3>
                <div id="pedidos-container">
                    <div class="empty-state"><i class="fa-regular fa-clock"></i>Nenhum pedido recebido ainda</div>
                </div>
            </div>
        </div>

        <!-- TAB PRODUTOS -->
        <div id="tab-produtos" class="tab-content">
            <div class="produtos-list">
                <div id="produtos-container">
                    <div class="empty-state"><i class="fa-regular fa-box"></i>Nenhum produto cadastrado</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== MODAL: ADICIONAR PRODUTO ========== -->
    <div class="modal" id="modal-produto">
        <div class="modal-content">
            <h3>📦 Adicionar Produto</h3>
            <form id="form-produto" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Nome do produto *</label>
                    <input type="text" id="produto-nome" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="produto-desc" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>Preço (R$) *</label>
                    <input type="number" id="produto-preco" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Estoque inicial</label>
                    <input type="number" id="produto-estoque" value="10">
                </div>
                <div class="form-group">
                    <label>Imagem do produto</label>
                    <input type="file" id="produto-imagem" accept="image/*" onchange="previewImagem(event)">
                    <img id="preview-img" class="preview-img">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-primary" onclick="fecharModal('modal-produto')">Cancelar</button>
                    <button type="submit" class="btn-primary btn-green">Salvar Produto</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ========== MODAL: REPOR ESTOQUE ========== -->
    <div class="modal" id="modal-estoque">
        <div class="modal-content">
            <h3>📦 Repor Estoque</h3>
            <div class="form-group">
                <label>Produto *</label>
                <select id="estoque-produto"></select>
            </div>
            <div class="form-group">
                <label>Quantidade a adicionar *</label>
                <input type="number" id="estoque-quantidade" value="10" min="1">
            </div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="fecharModal('modal-estoque')">Cancelar</button>
                <button class="btn-primary btn-green" onclick="reporEstoque()">Repor Estoque</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
        if (!usuario || usuario.tipo !== 'empresa') {
            window.location.href = '/login';
        }

        const token = localStorage.getItem('token');

        socket.emit('entrar_sala', `empresa_${usuario.id}`);
        socket.on('novo_pedido', (pedido) => {
            console.log('📦 Novo pedido:', pedido);
            carregarPedidos();
            showNotification('📦 Novo pedido recebido!', 'success');
        });

        // ========== TABS ==========
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'pedidos') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('tab-pedidos').classList.add('active');
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('tab-produtos').classList.add('active');
                carregarProdutos();
            }
        }

        // ========== CARREGAR PEDIDOS ==========
        async function carregarPedidos() {
            try {
                const response = await fetch('/api/pedidos/cliente', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                const container = document.getElementById('pedidos-container');
                if (!data.success || data.pedidos.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fa-regular fa-clock"></i>Nenhum pedido recebido ainda</div>`;
                    return;
                }
                
                const pedidosEmpresa = data.pedidos;
                
                document.getElementById('total-pedidos').textContent = pedidosEmpresa.length;
                const hoje = new Date().toDateString();
                const pedidosHoje = pedidosEmpresa.filter(p => new Date(p.data_pedido).toDateString() === hoje);
                document.getElementById('pedidos-hoje').textContent = pedidosHoje.length;
                const receita = pedidosHoje.reduce((sum, p) => sum + parseFloat(p.total), 0);
                document.getElementById('receita-hoje').textContent = `R$ ${receita.toFixed(2)}`;
                
                container.innerHTML = pedidosEmpresa.map(p => {
                    const statusClass = `badge-${p.status}`;
                    const statusLabels = {
                        'recebido': '📥 Recebido',
                        'preparando': '👨‍🍳 Preparando',
                        'embalando': '📦 Embalando',
                        'pronto': '✅ Pronto',
                        'saiu_entrega': '🚴 Saiu para entrega',
                        'entregue': '🎉 Entregue'
                    };
                    
                    return `
                        <div class="pedido-item">
                            <div>
                                <div><strong>Pedido #${p.id}</strong> - <span style="font-size:0.8rem;color:#6b7280;">${p.codigo_rastreamento}</span></div>
                                <div style="font-size:0.9rem;color:#6b7280;">Total: R$ ${parseFloat(p.total).toFixed(2)}</div>
                                <div style="font-size:0.8rem;color:#6b7280;">${new Date(p.data_pedido).toLocaleString()}</div>
                            </div>
                            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                                <span class="badge ${statusClass}">${statusLabels[p.status] || p.status}</span>
                                <select class="status-select" onchange="atualizarStatus(${p.id}, this.value)">
                                    <option value="recebido" ${p.status === 'recebido' ? 'selected' : ''}>Recebido</option>
                                    <option value="preparando" ${p.status === 'preparando' ? 'selected' : ''}>Preparando</option>
                                    <option value="embalando" ${p.status === 'embalando' ? 'selected' : ''}>Embalando</option>
                                    <option value="pronto" ${p.status === 'pronto' ? 'selected' : ''}>Pronto</option>
                                    <option value="saiu_entrega" ${p.status === 'saiu_entrega' ? 'selected' : ''}>Saiu para entrega</option>
                                    <option value="entregue" ${p.status === 'entregue' ? 'selected' : ''}>Entregue</option>
                                </select>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        // ========== ATUALIZAR STATUS ==========
        async function atualizarStatus(pedidoId, status) {
            try {
                const response = await fetch(`/api/pedidos/${pedidoId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status })
                });
                const data = await response.json();
                if (data.success) {
                    carregarPedidos();
                    showNotification('✅ Status atualizado!', 'success');
                }
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        // ========== CARREGAR PRODUTOS ==========
       async function carregarProdutos() {
    try {
        const response = await fetch('/api/produtos/empresa/1');
        const data = await response.json();
        
        const container = document.getElementById('produtos-container');
        document.getElementById('produtos-total').textContent = data.produtos?.length || 0;
        
        if (!data.success || data.produtos.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fa-regular fa-box"></i>Nenhum produto cadastrado</div>`;
            return;
        }
        
        container.innerHTML = data.produtos.map(p => `
            <div class="produto-item">
                <div>
                    <div><strong>${p.nome}</strong></div>
                    <div style="font-size:0.8rem;color:#6b7280;">${p.descricao || 'Sem descrição'}</div>
                    <div style="font-size:0.9rem;color:#1a1a2e;">R$ ${parseFloat(p.preco).toFixed(2)}</div>
                    <div style="font-size:0.8rem;">Estoque: ${p.estoque} unidades</div>
                </div>
            </div>
        `).join('');
    } catch (error) {
        console.error('Erro ao carregar produtos:', error);
    }
}

        // ========== ADICIONAR PRODUTO (COM IMAGEM) ==========
        // ========== ADICIONAR PRODUTO - VERSÃO FUNCIONANDO ==========
document.getElementById('form-produto').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const nome = document.getElementById('produto-nome').value;
    const descricao = document.getElementById('produto-desc').value || '';
    const preco = parseFloat(document.getElementById('produto-preco').value);
    const estoque = parseInt(document.getElementById('produto-estoque').value) || 0;
    
    // VALIDAR
    if (!nome || !preco || isNaN(preco)) {
        alert('❌ Preencha Nome e Preço corretamente!');
        return;
    }
    
    const produto = {
        empresa_id: 1,
        nome: nome,
        descricao: descricao,
        preco: preco,
        estoque: estoque
    };
    
    console.log('📦 Enviando:', produto);
    
    const btn = e.target.querySelector('button[type="submit"]');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvando...';
    btn.disabled = true;
    
    try {
        const token = localStorage.getItem('token');
        const response = await fetch('/api/produtos', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(produto)
        });
        
        const data = await response.json();
        console.log('📨 Resposta:', data);
        
        if (response.ok && data.success) {
            alert('✅ Produto criado com sucesso!');
            fecharModal('modal-produto');
            document.getElementById('form-produto').reset();
            carregarProdutos();
            carregarPedidos();
        } else {
            alert('❌ Erro: ' + (data.message || 'Falha ao criar produto'));
        }
    } catch (error) {
        console.error('❌ Erro:', error);
        alert('❌ Erro ao conectar com o servidor');
    } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
});

        // ========== REPOR ESTOQUE ==========
        async function carregarProdutosEstoque() {
            try {
                const response = await fetch('/api/produtos/empresa/1', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    const select = document.getElementById('estoque-produto');
                    select.innerHTML = data.produtos.map(p => `
                        <option value="${p.id}">${p.nome} (Estoque: ${p.estoque})</option>
                    `).join('');
                }
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        function abrirModalEstoque() {
            carregarProdutosEstoque();
            document.getElementById('modal-estoque').classList.add('active');
        }

        function abrirReporEstoque(id, nome, estoqueAtual) {
            document.getElementById('modal-estoque').classList.add('active');
            carregarProdutosEstoque();
            setTimeout(() => {
                document.getElementById('estoque-produto').value = id;
            }, 100);
        }

        async function reporEstoque() {
            const produtoId = document.getElementById('estoque-produto').value;
            const quantidade = parseInt(document.getElementById('estoque-quantidade').value);
            
            if (!produtoId || !quantidade || quantidade < 1) {
                showNotification('❌ Selecione um produto e uma quantidade válida', 'error');
                return;
            }
            
            try {
                const response = await fetch(`/api/produtos/empresa/1`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                const produto = data.produtos.find(p => p.id === parseInt(produtoId));
                
                if (!produto) {
                    showNotification('❌ Produto não encontrado', 'error');
                    return;
                }
                
                const novoEstoque = produto.estoque + quantidade;
                
                const updateResponse = await fetch(`/api/produtos/${produtoId}/estoque`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ estoque: novoEstoque })
                });
                
                const result = await updateResponse.json();
                
                if (result.success) {
                    showNotification(`✅ Estoque reposto!\n${produto.nome}: ${novoEstoque} unidades`, 'success');
                    fecharModal('modal-estoque');
                    carregarProdutos();
                    carregarPedidos();
                }
            } catch (error) {
                showNotification('❌ Erro ao repor estoque', 'error');
            }
        }

        // ========== MODAIS ==========
        function abrirModalProduto() {
            document.getElementById('modal-produto').classList.add('active');
        }

        function fecharModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // Fechar modal clicando fora
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // ========== NOTIFICAÇÕES ==========
        function showNotification(message, type) {
            const div = document.createElement('div');
            div.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'success' ? '#10b981' : '#ef4444'};
                color: white;
                padding: 15px 25px;
                border-radius: 12px;
                font-weight: 500;
                z-index: 9999;
                max-width: 400px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                animation: slideIn 0.3s ease;
            `;
            div.innerHTML = message;
            document.body.appendChild(div);
            
            setTimeout(() => {
                div.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => div.remove(), 300);
            }, 4000);
        }

        // ========== LOGOUT ==========
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('usuario');
            window.location.href = '/login';
        }

        // ========== INICIAR ==========
        carregarPedidos();

        // ========== CSS DE ANIMAÇÃO ==========
        const styleSheet = document.createElement('style');
        styleSheet.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>
