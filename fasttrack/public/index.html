<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- ... -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/cliente.css">
</head>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastTrack - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fa; }
        
        header {
            background: #1a1a2e;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { color: white; font-size: 1.5rem; font-weight: 800; }
        .logo span { color: #4fc3f7; }
        .header-actions { display: flex; gap: 20px; align-items: center; }
        .header-actions a { color: rgba(255,255,255,0.8); text-decoration: none; transition: 0.3s; }
        .header-actions a:hover { color: white; }
        .cart-btn { position: relative; cursor: pointer; color: white; font-size: 1.2rem; }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 50%;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 5%; }
        
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            border-radius: 30px;
            color: white;
            margin-bottom: 40px;
        }
        .hero h1 { font-size: 3rem; margin-bottom: 15px; }
        .hero h1 span { color: #4fc3f7; }
        .hero p { color: rgba(255,255,255,0.7); max-width: 600px; margin: 0 auto; }
        
        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }
        .search-bar input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            font-size: 1rem;
            outline: none;
        }
        .search-bar input:focus { border-color: #4fc3f7; }
        
        .restaurantes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .restaurante-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s;
            cursor: pointer;
        }
        .restaurante-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .restaurante-card h3 { margin-bottom: 5px; }
        .restaurante-card p { color: #6b7280; font-size: 0.9rem; }
        .restaurante-card .categoria {
            display: inline-block;
            background: #e5e7eb;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 10px;
        }
        
        .cart-drawer {
            position: fixed;
            top: 0;
            right: -450px;
            width: 450px;
            height: 100%;
            background: white;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            z-index: 1000;
            padding: 30px;
            transition: 0.3s;
            overflow-y: auto;
        }
        .cart-drawer.active { right: 0; }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .cart-total {
            padding: 20px 0;
            border-top: 2px solid #1a1a2e;
            margin-top: 20px;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .overlay.active { display: block; }
        
        .btn-primary {
            background: #4fc3f7;
            color: #1a1a2e;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79,195,247,0.3); }
        .btn-secondary {
            background: #1a1a2e;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-secondary:hover { background: #0f3460; }
        
        .empty-state { text-align: center; padding: 60px 0; color: #6b7280; }
        .empty-state i { font-size: 4rem; margin-bottom: 20px; display: block; }
        
        @media (max-width: 768px) {
            .cart-drawer { width: 100%; right: -100%; }
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Fast<span>Track</span></div>
        <div class="header-actions">
            <a href="/cliente/pedidos"><i class="fa-regular fa-clock"></i> Pedidos</a>
            <span class="cart-btn" onclick="toggleCart()">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count" id="cart-count">0</span>
            </span>
            <a href="#" id="user-name" style="color:#4fc3f7;">Perfil</a>
            <a href="#" onclick="logout()" style="color:#ef4444;"><i class="fa-solid fa-sign-out-alt"></i></a>
        </div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h3>🛒 Seu Carrinho</h3>
            <span onclick="toggleCart()" style="font-size:1.5rem;cursor:pointer;">✕</span>
        </div>
        <div id="cart-items"><div class="empty-state"><i class="fa-regular fa-cart-empty"></i>Seu carrinho está vazio</div></div>
        <div class="cart-total" id="cart-total">Total: R$ 0,00</div>
        <button class="btn-primary" style="width:100%;padding:15px;" onclick="finalizarPedido()">Finalizar Pedido</button>
    </div>

    <div class="container">
        <div class="hero">
            <h1>🍔 Peça seu <span>Fast Food</span></h1>
            <p>Os melhores restaurantes da sua região em um só lugar. Acompanhe seu pedido em tempo real!</p>
        </div>

        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Buscar restaurante..." onkeyup="filtrarRestaurantes()">
        </div>

        <div id="restaurantes-container" class="restaurantes-grid">
            <!-- Carregado via JavaScript -->
        </div>
    </div>

    <script>
        let cart = [];
        let restaurantes = [];
        let produtos = {};

        // ========== VERIFICAR AUTENTICAÇÃO ==========
        const usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
        if (usuario) {
            document.getElementById('user-name').textContent = usuario.nome.split(' ')[0];
        } else {
            window.location.href = '/login';
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('usuario');
            window.location.href = '/login';
        }

        // ========== CARREGAR RESTAURANTES ==========
        async function carregarRestaurantes() {
            try {
                const response = await fetch('/api/empresas');
                const data = await response.json();
                if (data.success) {
                    restaurantes = data.empresas;
                    renderizarRestaurantes(restaurantes);
                }
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        function renderizarRestaurantes(lista) {
            const container = document.getElementById('restaurantes-container');
            if (lista.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fa-regular fa-store"></i>Nenhum restaurante encontrado</div>';
                return;
            }
            
            container.innerHTML = lista.map(r => `
                <div class="restaurante-card" onclick="verRestaurante(${r.id})">
                    <h3>${r.nome}</h3>
                    <p>${r.endereco || 'Endereço não informado'}</p>
                    <span class="categoria">${r.categoria || 'Fast Food'}</span>
                </div>
            `).join('');
        }

        function filtrarRestaurantes() {
            const termo = document.getElementById('search-input').value.toLowerCase();
            const filtrados = restaurantes.filter(r => 
                r.nome.toLowerCase().includes(termo) || 
                (r.categoria && r.categoria.toLowerCase().includes(termo))
            );
            renderizarRestaurantes(filtrados);
        }

        // ========== VER RESTAURANTE (SIMPLES) ==========
        // ========== VER RESTAURANTE (COM TRATAMENTO DE ERRO) ==========
async function verRestaurante(id) {
    try {
        console.log('🔍 Buscando produtos do restaurante:', id);
        
        const response = await fetch(`/api/produtos/empresa/${id}`);
        console.log('📡 Status da resposta:', response.status);
        
        if (!response.ok) {
            throw new Error(`Erro HTTP: ${response.status}`);
        }
        
        const data = await response.json();
        console.log('📦 Dados recebidos:', data);
        
        if (!data.success) {
            throw new Error(data.message || 'Erro ao carregar produtos');
        }
        
        const produtos = data.produtos || [];
        
        if (produtos.length === 0) {
            alert('📭 Este restaurante ainda não tem produtos cadastrados.');
            return;
        }
        
        // Mostrar cardápio com imagens
        let mensagem = '🍔 CARDÁPIO:\n\n';
        mensagem += '═'.repeat(30) + '\n';
        
        produtos.forEach((p, index) => {
            const temImagem = p.imagem ? '📷' : '🍽️';
            mensagem += `${index + 1}. ${temImagem} ${p.nome}\n`;
            mensagem += `   R$ ${parseFloat(p.preco).toFixed(2)}`;
            if (p.descricao) mensagem += ` - ${p.descricao}`;
            mensagem += `\n   Estoque: ${p.estoque || 0} unidades\n\n`;
        });
        
        mensagem += '═'.repeat(30) + '\n';
        mensagem += 'Digite o número do produto que deseja adicionar:';
        
        const escolha = prompt(mensagem);
        
        if (escolha === null) return; // Cancelou
        
        const index = parseInt(escolha) - 1;
        
        if (isNaN(index) || index < 0 || index >= produtos.length) {
            alert('❌ Número inválido!');
            return;
        }
        
        const prod = produtos[index];
        const qtd = parseInt(prompt(`Quantos "${prod.nome}" você quer? (Estoque: ${prod.estoque})`)) || 1;
        
        if (qtd <= 0) {
            alert('❌ Quantidade inválida!');
            return;
        }
        
        if (qtd > prod.estoque) {
            alert(`❌ Estoque insuficiente! Disponível: ${prod.estoque}`);
            return;
        }
        
        addToCart(prod.id, prod.nome, prod.preco, qtd);
        alert(`✅ ${qtd}x ${prod.nome} adicionado ao carrinho!`);
        
    } catch (error) {
        console.error('❌ Erro completo:', error);
        alert(`❌ Erro ao carregar cardápio: ${error.message}\n\nVerifique se o servidor está rodando.`);
    }
}

        //produtor exibir
        async function carregarRestaurante(id) {
    try {
        const response = await fetch(`/api/produtos/empresa/${id}`);
        const data = await response.json();
        
        if (data.success) {
            const produtos = data.produtos;
            let mensagem = '🍔 Cardápio:\n\n';
            
            produtos.forEach((p, index) => {
                const imagemPreview = p.imagem ? ` [📷 Imagem disponível]` : '';
                mensagem += `${index + 1}. ${p.nome} - R$ ${p.preco.toFixed(2)}${imagemPreview}\n`;
            });
            
            // Mostrar cardápio com imagens na tela
            const container = document.getElementById('cardapio-container');
            if (container) {
                container.innerHTML = produtos.map(p => `
                    <div class="produto-card">
                        ${p.imagem ? `<img src="${p.imagem}" class="produto-img" style="width:100%;height:200px;object-fit:cover;border-radius:10px;">` : '<div style="height:200px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;border-radius:10px;">🍔</div>'}
                        <h4>${p.nome}</h4>
                        <p>${p.descricao || ''}</p>
                        <strong>R$ ${p.preco.toFixed(2)}</strong>
                        <button onclick="addToCart(${p.id}, '${p.nome}', ${p.preco})">Adicionar</button>
                    </div>
                `).join('');
            }
            
            // Também mostrar no prompt
            const escolha = prompt(mensagem + '\nDigite o número do produto:');
            if (escolha) {
                const index = parseInt(escolha) - 1;
                if (index >= 0 && index < produtos.length) {
                    const prod = produtos[index];
                    const qtd = parseInt(prompt(`Quantos ${prod.nome}?`)) || 1;
                    addToCart(prod.id, prod.nome, prod.preco, qtd);
                }
            }
        }
    } catch (error) {
        alert('Erro ao carregar cardápio');
    }
}

        // ========== CARRINHO ==========
        function addToCart(id, nome, preco, quantidade = 1) {
            const existente = cart.find(item => item.id === id);
            if (existente) {
                existente.quantidade += quantidade;
            } else {
                cart.push({ id, nome, preco, quantidade });
            }
            updateCartUI();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const count = document.getElementById('cart-count');
            const items = document.getElementById('cart-items');
            const total = document.getElementById('cart-total');
            
            count.textContent = cart.reduce((sum, item) => sum + item.quantidade, 0);
            
            if (cart.length === 0) {
                items.innerHTML = '<div class="empty-state"><i class="fa-regular fa-cart-empty"></i>Seu carrinho está vazio</div>';
                total.textContent = 'Total: R$ 0,00';
                return;
            }
            
            items.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div>
                        <strong>${item.nome}</strong>
                        <div style="font-size:0.8rem;color:#6b7280;">${item.quantidade}x R$ ${item.preco.toFixed(2)}</div>
                    </div>
                    <div>
                        <span style="color:#4fc3f7;font-weight:600;">R$ ${(item.preco * item.quantidade).toFixed(2)}</span>
                        <span onclick="removeFromCart(${index})" style="cursor:pointer;color:#ef4444;margin-left:15px;">✕</span>
                    </div>
                </div>
            `).join('');
            
            const totalValor = cart.reduce((sum, item) => sum + (item.preco * item.quantidade), 0);
            total.textContent = `Total: R$ ${totalValor.toFixed(2)}`;
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // ========== FINALIZAR PEDIDO ==========
        async function finalizarPedido() {
            if (cart.length === 0) {
                alert('Seu carrinho está vazio!');
                return;
            }

            const endereco = prompt('Digite o endereço de entrega:');
            if (!endereco) return;

            const formaPagamento = prompt('Forma de pagamento (Dinheiro/Cartão/PIX):') || 'Dinheiro';

            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/pedidos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        empresa_id: 1, // Por enquanto fixo
                        items: cart.map(item => ({
                            produto_id: item.id,
                            preco: item.preco,
                            quantidade: item.quantidade
                        })),
                        endereco_entrega: endereco,
                        forma_pagamento: formaPagamento,
                        taxa_entrega: 5.00
                    })
                });

                const data = await response.json();
                if (data.success) {
                    alert(`✅ Pedido realizado com sucesso!\nCódigo: ${data.pedido.codigo_rastreamento}\nAcompanhe em 'Meus Pedidos'`);
                    cart = [];
                    updateCartUI();
                    toggleCart();
                } else {
                    alert('Erro ao finalizar pedido');
                }
            } catch (error) {
                alert('Erro ao conectar com o servidor');
            }
        }

        // ========== INICIAR ==========
        carregarRestaurantes();
    </script>
</body>
</html>
