<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Zenera</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #2d5a27 0%, #1e3d1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .cadastro-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo img { max-width: 150px; }
        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }
        .input-group input:focus { border-color: #2d5a27; }
        .btn-cadastrar {
            width: 100%;
            background: #2d5a27;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-cadastrar:hover { background: #1e3d1a; }
        .error {
            background: #fee2e2;
            color: #ef4444;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .success {
            background: #dcfce7;
            color: #16a34a;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .back-login {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
        }
        .back-login:hover { color: #2d5a27; }
        .row {
            display: flex;
            gap: 10px;
        }
        .row .input-group {
            flex: 1;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2d5a27;
        }
    </style>
</head>
<body>
    <div class="cadastro-card">
        <div class="logo">
            <img src="./imagens/zenera_logo.png" alt="logo zenera">
        </div>
        
        <h2>Criar Nova Conta</h2>
        
        <div id="error-message" class="error"></div>
        <div id="success-message" class="success"></div>
        
        <form id="cadastro-form">
            <div class="input-group">
                <input type="text" id="nome" placeholder="Nome completo" required>
            </div>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="E-mail" required>
            </div>
            
            <div class="row">
                <div class="input-group">
                    <input type="text" id="telefone" placeholder="Telefone (11 99999-9999)">
                </div>
                <div class="input-group">
                    <input type="text" id="cpf" placeholder="CPF (111.222.333-44)">
                </div>
            </div>
            
            <div class="input-group">
                <input type="text" id="cep" placeholder="CEP (12345-678)">
                <button type="button" id="buscar-cep" style="margin-top: 10px; width: 100%; padding: 10px; background: #e5e5e5; border: none; border-radius: 10px; cursor: pointer;">
                    <i class="fa-solid fa-magnifying-glass"></i> Buscar Endereço
                </button>
            </div>
            
            <div class="row">
                <div class="input-group">
                    <input type="text" id="rua" placeholder="Rua" disabled>
                </div>
                <div class="input-group">
                    <input type="text" id="numero" placeholder="Número">
                </div>
            </div>
            
            <div class="row">
                <div class="input-group">
                    <input type="text" id="bairro" placeholder="Bairro" disabled>
                </div>
                <div class="input-group">
                    <input type="text" id="cidade" placeholder="Cidade" disabled>
                </div>
            </div>
            
            <div class="row">
                <div class="input-group">
                    <input type="text" id="estado" placeholder="UF" disabled>
                </div>
            </div>
            
            <div class="input-group">
                <input type="password" id="senha" placeholder="Senha" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="confirmar-senha" placeholder="Confirmar senha" required>
            </div>
            
            <button type="submit" class="btn-cadastrar">
                <i class="fa-solid fa-user-plus"></i> Cadastrar
            </button>
        </form>
        
        <a href="/login" class="back-login">← Já tenho uma conta! Fazer login</a>
    </div>

    <script>
        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');
        
        // Máscara para telefone
        document.getElementById('telefone').addEventListener('input', function(e) {
            let valor = e.target.value.replace(/\D/g, '');
            if (valor.length <= 10) {
                valor = valor.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
            } else {
                valor = valor.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            }
            e.target.value = valor;
        });
        
        // Máscara para CPF
        document.getElementById('cpf').addEventListener('input', function(e) {
            let valor = e.target.value.replace(/\D/g, '');
            valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
            valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
            valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = valor;
        });
        
        // Máscara para CEP
        document.getElementById('cep').addEventListener('input', function(e) {
            let valor = e.target.value.replace(/\D/g, '');
            valor = valor.replace(/(\d{5})(\d)/, '$1-$2');
            e.target.value = valor;
        });
        
        // Buscar CEP (ViaCEP)
        document.getElementById('buscar-cep').addEventListener('click', async () => {
            let cep = document.getElementById('cep').value.replace(/\D/g, '');
            
            if (cep.length !== 8) {
                errorDiv.textContent = 'Digite um CEP válido com 8 números!';
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
                return;
            }
            
            try {
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const dados = await response.json();
                
                if (dados.erro) {
                    errorDiv.textContent = 'CEP não encontrado!';
                    errorDiv.style.display = 'block';
                    setTimeout(() => errorDiv.style.display = 'none', 3000);
                    return;
                }
                
                document.getElementById('rua').value = dados.logradouro;
                document.getElementById('bairro').value = dados.bairro;
                document.getElementById('cidade').value = dados.localidade;
                document.getElementById('estado').value = dados.uf;
                
                successDiv.textContent = 'Endereço encontrado!';
                successDiv.style.display = 'block';
                setTimeout(() => successDiv.style.display = 'none', 2000);
                
            } catch (error) {
                errorDiv.textContent = 'Erro ao buscar CEP!';
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
            }
        });
        
        // CADASTRAR
        document.getElementById('cadastro-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('telefone').value;
            const cpf = document.getElementById('cpf').value;
            const cep = document.getElementById('cep').value;
            const senha = document.getElementById('senha').value;
            const confirmarSenha = document.getElementById('confirmar-senha').value;
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (!nome || !email || !senha) {
                errorDiv.textContent = 'Preencha nome, email e senha!';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (senha !== confirmarSenha) {
                errorDiv.textContent = 'As senhas não coincidem!';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/cadastrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, telefone, cpf, cep, senha })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successDiv.textContent = '✅ Cadastro realizado com sucesso! Redirecionando para o login...';
                    successDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    errorDiv.textContent = data.message || 'Erro ao cadastrar';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Erro ao conectar com o servidor!';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
